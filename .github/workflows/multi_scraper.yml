name: Trigger Daily News Scraper

on:
  schedule:
    # تجربة مؤقتة - سيتم إرجاعه للساعة 2 الظهر بعد التأكد
    - cron: '17 3 * * *'
  workflow_dispatch: # تشغيل يدوي

jobs:
  trigger-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Trigger auto_scraper.php
      run: |
        echo "Triggering scraper at $(date)..."
        RESPONSE=$(curl -s -o response.json -w "%{http_code}" "http://elgeza.42web.io/auto_scraper.php?secret=${{ secrets.SCRAPER_SECRET }}")
        echo "HTTP Status: $RESPONSE"
        cat response.json
        if [ "$RESPONSE" -ne 200 ]; then
          echo "::warning::Scraper returned non-200 status"
        fi
