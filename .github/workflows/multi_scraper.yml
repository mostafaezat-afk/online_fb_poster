name: Trigger Daily News Scraper

on:
  schedule:
    # يومياً الساعة 12:00 UTC = 2:00 PM مصر
    - cron: '0 12 * * *'
  workflow_dispatch: # تشغيل يدوي

jobs:
  trigger-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Playwright
      run: |
        pip install playwright
        playwright install chromium

    - name: Run Trigger Script
      env:
        SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
      run: |
        python trigger_scraper.py "http://elgeza.42web.io/auto_scraper.php?secret=$SCRAPER_SECRET"
